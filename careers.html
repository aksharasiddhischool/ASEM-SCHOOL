<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers - Akshara Siddhi E.M. School</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .careers-container { padding: 80px 20px; background-color: #f9f9f9; display: flex; flex-direction: column; align-items: center; }
        .career-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { font-weight: bold; display: block; margin-bottom: 8px; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-apply { background: #008080; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-apply:hover { background: #004d40; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-content">
            <img src="asem_logo.jpeg" alt="Logo" class="loader-logo">
            <div class="loader-bar"></div>
        </div>
    </div>

    <header class="main-header">
        <div class="header-title">
            <h1>AKSHARA SIDDHI E.M. SCHOOL</h1>
            <p class="sub-title">Careers Portal</p>
        </div>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="index.html#academics">Academics</a>
            <a href="admissions.html">Admissions</a>
            <a href="careers.html" style="color: #008080; font-weight: bold;">Careers</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <section class="careers-container">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #008080; font-size: 2rem;">Join Our Faculty</h2>
            <p>Help us shape the next generation of leaders.</p>
        </div>

        <div class="career-card">
            <form action="https://formsubmit.co/aksharasiddhischool@gmail.com" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="_subject" value="New Job Application - ASEM School">
                <input type="hidden" name="_next" value="https://aksharasiddhischool.github.io/ASEM-SCHOOL/thankyou.html">
                <input type="hidden" name="_captcha" value="false">

                <div class="form-group"><label>Full Name</label><input type="text" name="Candidate_Name" required></div>
                <div class="form-group"><label>Contact Number</label><input type="tel" name="Phone" required></div>
                <div class="form-group">
                    <label>Role</label>
                    <select name="Role" required>
                        <option value="Maths">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="Primary">Primary Teacher</option>
                    </select>
                </div>
                <div class="form-group"><label>Upload Resume (PDF)</label><input type="file" name="Resume" accept=".pdf" required></div>
                <button type="submit" class="btn-apply">Submit Application</button>
            </form>
        </div>
    </section>

    <footer class="school-footer" style="text-align: center; padding: 30px; background: #333; color: white;">
        <p>© 2026 Akshara Siddhi E.M. School</p>
    </footer>

    <div id="lego-mini-stage" style="position: fixed; bottom: 0; left: 0; width: 300px; height: 250px; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 1s ease-in;"></div>

    <script src="java.js"></script>
</body>
</html>
