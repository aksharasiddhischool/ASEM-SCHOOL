<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers - Akshara Siddhi E.M. School</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: white !important; color: black !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .careers-section { padding: 60px 20px !important; background: #f4f7f6; }
        .form-container { 
            max-width: 650px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #333; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; 
            box-sizing: border-box; font-size: 1rem;
        }
        input:focus { border-color: #008080; outline: none; box-shadow: 0 0 5px rgba(0,128,128,0.2); }
        .btn-submit { 
            background-color: #008080; color: white; padding: 15px; border: none; 
            border-radius: 6px; cursor: pointer; width: 100%; font-size: 1.1rem; 
            font-weight: bold; transition: background 0.3s ease;
        }
        .btn-submit:hover { background-color: #004d40; }
        
        /* Preloader CSS Fix */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .loader-bar { width: 200px; height: 4px; background: #eee; position: relative; overflow: hidden; }
        .loader-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #008080; animation: load 1.5s infinite; }
        @keyframes load { 100% { left: 100%; } }
    </style>
</head>
<body>

<div id="preloader">
    <div class="loader-content">
        <div class="loader-bar"></div>
        <p>Loading Careers Portal...</p>
    </div>
</div>

<header class="main-header" style="background: #008080; color: white; padding: 20px; text-align: center;">
    <h1>AKSHARA SIDDHI E.M. SCHOOL</h1>
    <nav style="margin-top: 15px;">
        <a href="index.html" style="color: white; margin: 0 15px; text-decoration: none;">Home</a>
        <a href="about.html" style="color: white; margin: 0 15px; text-decoration: none;">About</a>
        <a href="careers.html" style="color: #ffd700; margin: 0 15px; text-decoration: none; font-weight: bold;">Careers</a>
    </nav>
</header>

<section class="careers-section">
    <h2 style="text-align: center; color: #008080;">Faculty Recruitment 2026</h2>
    <p style="text-align: center; margin-bottom: 40px;">Shape the future with Akshara Siddhi.</p>
    
    <div class="form-container">
        <form action="https://formsubmit.co/aksharasiddhischool@gmail.com" method="POST" enctype="multipart/form-data">
            
            <input type="hidden" name="_subject" value="New Job Application: ASEM School">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://aksharasiddhischool.github.io/ASEM-SCHOOL/thankyou.html">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="Name" required placeholder="Full Name">
            </div>

            <div class="form-group">
                <label>Contact Number</label>
                <input type="tel" name="Phone" required placeholder="+91">
            </div>

            <div class="form-group">
                <label>Position Applied For</label>
                <select name="Role" required>
                    <option value="">-- Select Subject --</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Science">Science</option>
                    <option value="Social">Social Studies</option>
                    <option value="English">English</option>
                    <option value="Telugu">Telugu</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Computers">Computers/IT</option>
                    <option value="Primary">Primary/Nursery</option>
                    <option value="Admin">Administration</option>
                </select>
            </div>

            <div class="form-group">
                <label>Work Experience</label>
                <input type="text" name="Experience" placeholder="e.g. 3 Years at XYZ School">
            </div>

            <div class="form-group">
                <label>Upload Resume (PDF only)</label>
                <input type="file" name="Resume" accept=".pdf" required>
            </div>

            <button type="submit" class="btn-submit">Submit Application</button>
        </form>
    </div>
</section>

<footer style="text-align: center; padding: 20px; background: #333; color: white;">
    <p>© 2026 Akshara Siddhi E.M. School | Innovative Education</p>
</footer>

<script>
    // Ensures preloader disappears even if assets are slow
    window.addEventListener('load', function() {
        document.getElementById('preloader').style.display = 'none';
    });
</script>

</body>
</html>
